  #     - read_file
  #     - query_knowledge_base
  #   system_prompt: "You are a helpful assistant."
  #   temperature: 0.7
  #   privilege_level: 1

  # --- Anthropic agent (requires ANTHROPIC_API_KEY in .env) ----
  # - id: claude-agent
  #   name: "Claude Agent"
  #   provider:
  #     type: anthropic
  #     model: claude-sonnet-4-6
  #     api_key: "${ANTHROPIC_API_KEY}"
  #   tools: [fetch_webpage, read_file, query_knowledge_base]
  #   temperature: 0.7
  #   privilege_level: 1

# ============================================================
# Chains
# ============================================================

chains:

  # Research → Summarise → Format sequential chain
  - chain_id: research-chain
    mode: sequential
    agent_ids:
      - local-assistant   # Step 1: research / gather info
      - local-assistant   # Step 2: summarise (re-uses same agent for demo)

  # Parallel analysis (all agents run the same query, merge)
  # - chain_id: parallel-analysis
